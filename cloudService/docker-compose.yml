version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: cloud-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cloud_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cloud_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
